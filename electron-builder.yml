appId: com.keycache.app
productName: Keycache
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: resources/trayIconTemplate.png
    to: trayIconTemplate.png
  - from: resources/trayIconTemplate@2x.png
    to: trayIconTemplate@2x.png
  - from: resources/trayIconTemplate-devbuild.png
    to: trayIconTemplate-devbuild.png
  - from: resources/trayIconTemplate-devbuild@2x.png
    to: trayIconTemplate-devbuild@2x.png
  - from: resources/tray-icon.png
    to: tray-icon.png
  - from: resources/tray-icon.ico
    to: tray-icon.ico
  - from: build/icon.png
    to: icon.png
mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  artifactName: ${productName}-${version}-${arch}.${ext}
  category: public.app-category.productivity
  extraResources:
    - from: build/Credits.rtf
      to: Credits.rtf
win:
  icon: build/icon.ico
  target:
    - nsis
linux:
  icon: build/icon.png
  target:
    - AppImage
npmRebuild: true
